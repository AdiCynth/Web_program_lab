<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom & Petal | Login</title>
    <meta name="description" content="Login to your Bloom & Petal account to order fresh flowers and track your deliveries.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">🌸 Bloom &amp; Petal</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="catalogue.html">Catalogue</a></li>
                    <li><a href="login.html" class="active">Login</a></li>
                    <li><a href="reg.html">Register</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="form-container">
            <h2 style="margin-bottom: 1.5rem; text-align: center; color: var(--primary-color);">Account Login</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="username">Email Address / Username</label>
                    <input type="email" id="username" class="form-control" placeholder="enter your registered email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="color: var(--secondary-color); text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>
            <div class="form-footer">
                <p>New customer? <a href="reg.html">Create an account here</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Bloom &amp; Petal Online Flower Shop. WPL Mini Project - All Rights Reserved.</p>
    </footer>

</body>
</html>
